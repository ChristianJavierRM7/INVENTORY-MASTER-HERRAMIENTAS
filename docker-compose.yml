version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: herramientas_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-herramientas_app}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password is required}
    ports:
      - "5435:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d herramientas_app"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend-api:
    build:
      context: ./herramientas-node-api
      dockerfile: Dockerfile
    container_name: herramientas_backend
    restart: always
    environment:
      - PORT=4005
      - NODE_ENV=${NODE_ENV:-production}
      - DB_HOST=${DB_HOST:-postgres}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-herramientas_app}
      - DB_USER=${DB_USER:-postgres}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_SYNC_ALTER=${DB_SYNC_ALTER:-false}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  frontend-app:
    build:
      context: ./frontend-app
      dockerfile: Dockerfile
    container_name: herramientas_frontend
    restart: always
    environment:
      - BACKEND_HOST=backend-api
      - BACKEND_PORT=4005
    depends_on:
      - backend-api
    ports:
      - "${FRONTEND_PORT:-8082}:80"

volumes:
  db_data: