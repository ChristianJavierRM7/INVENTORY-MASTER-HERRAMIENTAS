server {
    listen 80;
    server_name localhost;

    # Directorio donde se compila la app de React
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Evita errores 404 al recargar rutas de react-router
    }

    # Redirección interna y limpia hacia el contenedor del backend
    location /api/ {
        resolver ${DNS_RESOLVER} valid=30s;
        set $backend_host ${BACKEND_HOST};
        set $backend_port ${BACKEND_PORT};
        proxy_pass http://$backend_host:$backend_port;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Redirección opcional para la documentación de Swagger si deseas verla desde el dominio principal
    location /docs {
        resolver ${DNS_RESOLVER} valid=30s;
        set $backend_host ${BACKEND_HOST};
        set $backend_port ${BACKEND_PORT};
        proxy_pass http://$backend_host:$backend_port/docs;
        proxy_set_header Host $host;
    }
}